services:
  - type: web
    name: ace-poker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: RENDER
        value: true
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
